name: Release

# Запускается при публикации релиза на GitHub. Версию берём из тега релиза
# (ведущая "v" отбрасывается) и проставляем её и в сервер, и в десктоп перед сборкой.
on:
  release:
    types: [published]

permissions:
  contents: write # tauri-action прикладывает бандлы к релизу

jobs:
  # --- Версия из тега релиза -> отдаём остальным job'ам ---
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
    steps:
      - id: v
        run: |
          tag="${{ github.event.release.tag_name }}"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"

  # --- Сервер: Docker-образ linux/arm64 (Raspberry Pi) -> приватный регистри ---
  # Собираем НАТИВНО на arm64-раннере (бесплатен для публичных репозиториев),
  # без QEMU: эмуляция компиляции Rust занимала десятки минут.
  server:
    needs: version
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v5

      - name: Проставить версию релиза
        run: bash scripts/set-version.sh "${{ needs.version.outputs.version }}"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v4
        with:
          registry: ${{ secrets.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          # Полный путь образа без тега, напр. registry.example.com/me/corgitrack
          images: ${{ secrets.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ needs.version.outputs.version }}
            type=raw,value=latest

      - uses: docker/build-push-action@v6
        with:
          context: ./server
          file: ./server/Dockerfile
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # --- Десктоп: Tauri-бандлы под Windows / macOS / Linux, грузятся в релиз ---
  desktop:
    needs: version
    strategy:
      fail-fast: false
      matrix:
        platform: [windows-latest, macos-latest, ubuntu-22.04]
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable

      - name: Системные зависимости (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libayatana-appindicator3-dev \
            patchelf

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri

      - name: Проставить версию релиза
        shell: bash
        run: bash scripts/set-version.sh "${{ needs.version.outputs.version }}"

      - name: Установить фронтенд-зависимости
        working-directory: desktop
        run: npm ci

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Подпись апдейтера: приватный ключ minisign и его пароль из секретов.
          # tauri-action сам подписывает бандлы и публикует latest.json в релиз.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: desktop
          releaseId: ${{ github.event.release.id }}
