version: 2
updates:
  # Зависимости Rust-сервера
  - package-ecosystem: cargo
    directory: /server
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"

  # Зависимости нативной части Tauri
  - package-ecosystem: cargo
    directory: /desktop/src-tauri
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"

  # Зависимости фронтенда десктоп-клиента
  - package-ecosystem: npm
    directory: /desktop
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"

  # GitHub Actions в воркфлоу
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore(ci)"
