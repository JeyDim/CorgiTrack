services:
  app:
    image: cr.selcloud.ru/kip-sapp/corgi-track:v2.0.0
    pull_policy:  never
    build:
      context: ./server
    environment:
      DATABASE_URL: postgres://corgitrack:corgitrack@postgres:5432/corgitrack
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:8000}
      APP_TIMEZONE: ${APP_TIMEZONE:-Europe/Astrakhan}
      SERVICE_TOKEN: ${SERVICE_TOKEN:-change-me}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_API_SERVER_URL: ${TELEGRAM_API_SERVER_URL:-https://tgproxy.advsrvone.pw/}
      RUST_LOG: ${RUST_LOG:-info}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: corgitrack
      POSTGRES_PASSWORD: corgitrack
      POSTGRES_DB: corgitrack
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U corgitrack -d corgitrack"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
